<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветы360</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: #333;
        }
        
        .screen {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .screen.active {
            display: block;
        }

        /* --- Экран 1: Авторизация --- */
        .auth-container {
            background: #fff;
            max-width: 450px;
            margin: 15vh auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-container h2 {
            color: #2c7a3f;
            margin-top: 0;
        }
        .code-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5em;
            font-weight: bold;
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            letter-spacing: 2px;
            word-wrap: break-word;
        }
        
        /* --- Экран 2: Форум --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 2px solid #dde1e6;
            margin-bottom: 30px;
        }
        
        /* Заголовок по центру */
        .header-center {
            flex: 1;
            text-align: center;
        }
        .header-center h1 {
            margin: 0;
            color: #2c7a3f;
            font-size: 2.5em;
        }
        
        /* Кнопка и код справа */
        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }
        
        /* Компенсация пространства слева для точного центрирования */
        .header-left {
            flex: 1;
        }

        .user-code-badge {
            font-family: monospace;
            background: #e9ecef;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            border: 1px solid #ccc;
        }

        /* Фильтры и галерея */
        .category-filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .btn {
            background-color: #2c7a3f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #236332; }
        .btn-outline {
            background-color: transparent;
            color: #2c7a3f;
            border: 2px solid #2c7a3f;
        }
        .btn-outline.active, .btn-outline:hover {
            background-color: #2c7a3f;
            color: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .gallery-item .meta {
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            color: #666;
            background: #fff;
        }

        /* --- Модальное окно --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-content select, .modal-content input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
        }
        .modal-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .btn-danger { background-color: #d9534f; }
        .btn-danger:hover { background-color: #c9302c; }
        
        #uploadStatus { text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen1" class="screen">
        <div class="auth-container">
            <h2>Регистрация в системе</h2>
            <p>Ваш аккаунт привязывается к текущему IP-адресу.</p>
            <div id="ipDisplay" style="color: #666; margin-bottom: 20px;">Определение IP...</div>
            
            <button id="generateBtn" class="btn" style="width: 100%; display: none;" onclick="generateAccess()">Сгенерировать код доступа</button>
            
            <div id="codeResult" style="display: none;">
                <p>Ваш уникальный ключ 5x5:</p>
                <div class="code-display" id="newCodeDisplay"></div>
                <button class="btn" style="width: 100%;" onclick="enterSite()">Войти на форум</button>
            </div>
        </div>
    </div>

    <div id="screen2" class="screen">
        <header>
            <div class="header-left"></div>
            
            <div class="header-center">
                <h1>Цветы360</h1>
            </div>
            
            <div class="header-right">
                <button class="btn" onclick="openModal()">Добавить фото</button>
                <span class="user-code-badge" id="currentUserCode"></span>
            </div>
        </header>

        <div class="category-filters">
            <button class="btn btn-outline active" onclick="filterGallery('Все', this)">Все</button>
            <button class="btn btn-outline" onclick="filterGallery('Цветы', this)">Цветы</button>
            <button class="btn btn-outline" onclick="filterGallery('Растения', this)">Растения</button>
            <button class="btn btn-outline" onclick="filterGallery('Овощи', this)">Овощи</button>
        </div>

        <div class="gallery" id="galleryContainer">
            </div>
    </div>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top: 0;">Публикация фотографии</h3>
            
            <label for="photoCategory">Выберите категорию:</label>
            <select id="photoCategory">
                <option value="Цветы">Цветы</option>
                <option value="Растения">Растения</option>
                <option value="Овощи">Овощи</option>
            </select>
            
            <label for="photoFile">Файл изображения:</label>
            <input type="file" id="photoFile" accept="image/*">
            
            <div id="uploadStatus"></div>
            
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeModal()">Отмена</button>
                <button class="btn" onclick="uploadToCloudinary()">Отправить на сервер</button>
            </div>
        </div>
    </div>

    <script>
        // --- Конфигурация Cloudinary ---
        const CLOUD_NAME = 'dic7fcdgy';
        const UPLOAD_PRESET = 'ctefeth_780';

        // --- Глобальные переменные ---
        let userIP = '';
        let userSessionData = JSON.parse(localStorage.getItem('flowers360_auth')) || null;
        let photosDB = JSON.parse(localStorage.getItem('flowers360_photos')) || [];

        // --- Инициализация и проверка IP ---
        async function init() {
            try {
                // Получаем IP пользователя
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIP = data.ip;
                
                // Проверяем, есть ли уже код для этого IP
                if (userSessionData && userSessionData.ip === userIP) {
                    showScreen2();
                } else {
                    // Если IP сменился или первый вход
                    document.getElementById('ipDisplay').innerText = `Ваш IP: ${userIP}`;
                    document.getElementById('generateBtn').style.display = 'inline-block';
                    showScreen1();
                }
            } catch (error) {
                document.getElementById('ipDisplay').innerText = "Не удалось определить IP. Используется локальный режим.";
                document.getElementById('generateBtn').style.display = 'inline-block';
                showScreen1();
            }
        }

        // --- Логика Экрана 1 (Генерация 5х5) ---
        function generateAccess() {
            // Генерация ключа формата XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
            const genSegment = () => Math.random().toString(36).substring(2, 7).toUpperCase();
            const code5x5 = `${genSegment()}-${genSegment()}-${genSegment()}-${genSegment()}-${genSegment()}`;
            
            // Сохранение привязки IP -> Код
            userSessionData = {
                ip: userIP || 'local',
                code: code5x5
            };
            localStorage.setItem('flowers360_auth', JSON.stringify(userSessionData));
            
            document.getElementById('generateBtn').style.display = 'none';
            document.getElementById('codeResult').style.display = 'block';
            document.getElementById('newCodeDisplay').innerText = code5x5;
        }

        // --- Переключение экранов ---
        function showScreen1() {
            document.getElementById('screen1').classList.add('active');
            document.getElementById('screen2').classList.remove('active');
        }

        function showScreen2() {
            document.getElementById('screen1').classList.remove('active');
            document.getElementById('screen2').classList.add('active');
            document.getElementById('currentUserCode').innerText = userSessionData.code;
            renderGallery('Все');
        }

        function enterSite() {
            showScreen2();
        }

        // --- Модальное окно загрузки ---
        function openModal() {
            document.getElementById('uploadModal').classList.add('active');
            document.getElementById('uploadStatus').innerText = '';
        }

        function closeModal() {
            document.getElementById('uploadModal').classList.remove('active');
            document.getElementById('photoFile').value = '';
        }

        // --- Отправка фото на Cloudinary ---
        async function uploadToCloudinary() {
            const fileInput = document.getElementById('photoFile');
            const category = document.getElementById('photoCategory').value;
            const statusDiv = document.getElementById('uploadStatus');

            if (!fileInput.files || fileInput.files.length === 0) {
                statusDiv.style.color = '#d9534f';
                statusDiv.innerText = 'Пожалуйста, выберите файл.';
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            // Параметр folder раскидывает загружаемые фото по папкам (группам) внутри Cloudinary
            formData.append('folder', `Цветы360/${category}`); 

            statusDiv.style.color = '#333';
            statusDiv.innerText = 'Загрузка файла на сервер...';

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.secure_url) {
                    // Сохраняем информацию об успешной загрузке в локальную БД браузера
                    photosDB.push({
                        url: data.secure_url,
                        category: category,
                        timestamp: new Date().getTime()
                    });
                    localStorage.setItem('flowers360_photos', JSON.stringify(photosDB));
                    
                    statusDiv.style.color = '#2c7a3f';
                    statusDiv.innerText = 'Успешно загружено!';
                    
                    setTimeout(() => {
                        closeModal();
                        // Имитируем нажатие на кнопку "Все" для обновления
                        document.querySelector('.btn-outline').click(); 
                    }, 1000);
                } else {
                    throw new Error(data.error?.message || 'Неизвестная ошибка сервера');
                }
            } catch (error) {
                console.error(error);
                statusDiv.style.color = '#d9534f';
                statusDiv.innerText = 'Ошибка при загрузке. Проверьте настройки Preset Cloudinary.';
            }
        }

        // --- Рендеринг Галереи и Фильтрация ---
        function filterGallery(category, buttonElement) {
            // Обновление активной кнопки
            if (buttonElement) {
                document.querySelectorAll('.category-filters .btn-outline').forEach(btn => {
                    btn.classList.remove('active');
                });
                buttonElement.classList.add('active');
            }

            renderGallery(category);
        }

        function renderGallery(filterCategory) {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = '';

            // Сортировка по времени загрузки (сначала новые)
            const sortedPhotos = [...photosDB].sort((a, b) => b.timestamp - a.timestamp);
            
            const filteredPhotos = filterCategory === 'Все' 
                ? sortedPhotos 
                : sortedPhotos.filter(p => p.category === filterCategory);

            if (filteredPhotos.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666;">В данной категории пока нет фотографий.</p>';
                return;
            }

            filteredPhotos.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                
                const img = document.createElement('img');
                img.src = photo.url;
                img.loading = "lazy";
                img.alt = photo.category;

                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.innerText = `Группа: ${photo.category}`;

                item.appendChild(img);
                item.appendChild(meta);
                container.appendChild(item);
            });
        }

        // Запуск
        window.onload = init;
    </script>
</body>
</html>
