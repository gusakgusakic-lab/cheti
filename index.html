<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Порно360</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #121824;
            --bg-input: #1b2434;
            --accent: #2ea043;
            --accent-hover: #238636;
            --text-main: #f0f6fc;
            --text-muted: #7d8a9e;
            --border: #212e46;
            --danger: #f85149;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            flex-direction: column;
        }
        
        .screen.active {
            display: flex;
        }

        /* --- ЭКРАН АВТОРИЗАЦИИ --- */
        .auth-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #090d16 0%, #111a2e 100%);
        }

        .auth-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 350px;
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .auth-container h2 {
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .auth-container p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }

        header h1 span { color: var(--accent); }

        .user-badge {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--bg-input);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-weight: 600;
        }

        /* Навигационная панель (Вкладки) */
        .navigation {
            display: flex;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .navigation::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex: 1;
            min-width: 85px;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 14px 5px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .nav-btn.active {
            color: var(--text-main);
            border-bottom-color: var(--accent);
        }

        /* Контентная зона */
        .content-area {
            flex: 1;
            background: var(--bg-main);
            overflow-y: auto;
            padding: 12px;
            padding-bottom: 80px; /* Отступ для плавающей кнопки */
        }

        /* Сетка 2 в ряд с пропорциями 9:16 */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .grid-item {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            /* Формула для строгого соотношения 9:16 */
            aspect-ratio: 9 / 16; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .grid-item:active img {
            transform: scale(0.97);
        }

        /* Кнопка удаления */
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(248, 81, 73, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Плавающая кнопка «Добавить» */
        .fab-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(46, 160, 67, 0.4);
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fab-btn:hover { background: var(--accent-hover); }

        /* --- КНОПКИ И МОДАЛКИ --- */
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background: var(--accent-hover); }

        /* Окно загрузки */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 7, 12, 0.9);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
        }
        .modal-body h3 { margin: 0 0 15px 0; font-size: 1.3rem; }
        .modal-body select, .modal-body input[type="file"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        #status { text-align: center; font-size: 0.9rem; margin-bottom: 15px; font-weight: 600; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer;}
        .btn-cancel { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }

        /* --- ПОЛНОЭКРАННЫЙ ПРОСМОТР ФОТО --- */
        .viewer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .viewer-overlay.active { display: flex; }
        .viewer-overlay img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="screenAuth" class="screen auth-screen active">
        <div class="auth-container">
            <h2>Порно360</h2>
            <p>Вход или регистрация</p>
            
            <div class="input-group">
                <label for="loginInput">ЛОГИН</label>
                <input type="text" id="loginInput" class="auth-input" placeholder="Имя пользователя">
            </div>
            
            <div class="input-group">
                <label for="passwordInput">ПАРОЛЬ</label>
                <input type="password" id="passwordInput" class="auth-input" placeholder="••••••••">
            </div>
            
            <button class="btn" style="margin-top: 10px;" onclick="handleAuth()">Войти / Создать учётную запись</button>
        </div>
    </div>

    <div id="screenApp" class="screen">
        <header>
            <h1>Порно<span>360</span></h1>
            <div class="user-badge" id="userBadge">User</div>
        </header>

        <div class="navigation">
            <button class="nav-btn active" onclick="switchTab('Приватное', this)">Приватное</button>
            <button class="nav-btn" onclick="switchTab('Аниме', this)">Аниме</button>
            <button class="nav-btn" onclick="switchTab('Реал', this)">Реал</button>
            <button class="nav-btn" onclick="switchTab('Фурри', this)">Фурри</button>
        </div>

        <div class="content-area">
            <div id="galleryGrid" class="grid-view"></div>
        </div>

        <button class="fab-btn" onclick="openModal()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Добавить порно
        </button>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-body">
            <h3>Новая порнография</h3>
            <select id="uploadCategory">
                <option value="Приватное">Приватное</option>
                <option value="Аниме">Аниме</option>
                <option value="Реал">Реал</option>
                <option value="Фурри">Фурри</option>
            </select>
            <input type="file" id="fileInput" accept="image/*">
            <div id="status"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn" style="width:auto; flex:1;" onclick="uploadPhoto()">Загрузить</button>
            </div>
        </div>
    </div>

    <div id="imageViewer" class="viewer-overlay" onclick="closeImageViewer()">
        <img id="viewerImg" src="" alt="Full View">
    </div>

    <script>
        const CLOUD_NAME = 'dic7fcdgy';
        const UPLOAD_PRESET = 'ctefeth_780';

        let currentUser = null;
        let currentTab = 'Приватное';

        // Базы данных в LocalStorage
        let usersDB = JSON.parse(localStorage.getItem('flowers_users')) || {}; 
        let photosDB = JSON.parse(localStorage.getItem('flowers_photos_main')) || [];

        // Логика авторизации
        function handleAuth() {
            const login = document.getElementById('loginInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            if (!login || !pass) {
                alert('Заполните все хуи!');
                return;
            }

            if (usersDB[login]) {
                // Если пользователь существует, проверяем пароль
                if (usersDB[login] !== pass) {
                    alert('idi НахYй!');
                    return;
                }
            } else {
                // Если нет — регистрируем нового
                usersDB[login] = pass;
                localStorage.setItem('flowers_users', JSON.stringify(usersDB));
                alert(`${login} Ебётся!`);
            }

            currentUser = login;
            document.getElementById('userBadge').innerText = currentUser;
            
            // Переключаем экраны
            document.getElementById('screenAuth').classList.remove('active');
            document.getElementById('screenApp').classList.add('active');
            
            renderGrid();
        }

        // Переключение категорий
        function switchTab(category, btn) {
            currentTab = category;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        }

        // Удаление фотографии
        function deletePhoto(e, id) {
            e.stopPropagation(); // Чтобы не открывался полноэкранный режим при клике на крестик
            if (confirm('Удалить эту порнографию?')) {
                photosDB = photosDB.filter(p => p.id !== id);
                localStorage.setItem('flowers_photos_main', JSON.stringify(photosDB));
                renderGrid();
            }
        }

        // Отрисовка галереи (9:16)
        function renderGrid() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            let filtered = [];

            if (currentTab === 'Приватное') {
                // В приватном показываем только фото текущего пользователя с категорией "Приватное"
                filtered = photosDB.filter(p => p.category === 'Приватное' && p.owner === currentUser);
            } else {
                // В общих вкладках показываем фото всех пользователей из этой категории
                filtered = photosDB.filter(p => p.category === currentTab);
            }

            // Новые фото сверху
            filtered.reverse();

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; padding:50px 10px; text-align:center; color:var(--text-muted); font-size:0.9rem;">Здесь пока ничего нет</div>`;
                return;
            }

            filtered.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.onclick = () => openImageViewer(photo.url);
                
                // Кнопку удаления показываем, только если фото принадлежит текущему юзеру
                const deleteHtml = photo.owner === currentUser 
                    ? `<button class="delete-btn" onclick="deletePhoto(event, ${photo.id})">✕</button>` 
                    : '';

                item.innerHTML = `
                    <img src="${photo.url}" loading="lazy" alt="img">
                    ${deleteHtml}
                `;
                grid.appendChild(item);
            });
        }

        /* --- ПОЛНОЭКРАННЫЙ ПРОСМОТР --- */
        function openImageViewer(url) {
            const viewer = document.getElementById('imageViewer');
            const img = document.getElementById('viewerImg');
            img.src = url;
            viewer.classList.add('active');
        }

        function closeImageViewer() {
            document.getElementById('imageViewer').classList.remove('active');
        }

        /* --- УПРАВЛЕНИЕ МОДАЛКОЙ ЗАГРУЗКИ --- */
        function openModal() { document.getElementById('uploadModal').classList.add('active'); }
        function closeModal() { 
            document.getElementById('uploadModal').classList.remove('active'); 
            document.getElementById('status').innerText = '';
            document.getElementById('fileInput').value = '';
        }

        /* --- СЕРВЕРНАЯ ЗАГРУЗКА НА CLOUDINARY --- */
        async function uploadPhoto() {
            const fileInput = document.getElementById('fileInput');
            const category = document.getElementById('uploadCategory').value;
            const status = document.getElementById('status');

            if (!fileInput.files[0]) {
                status.style.color = 'var(--danger)';
                status.innerText = 'Выберите файл!';
                return;
            }

            status.style.color = 'var(--text-main)';
            status.innerText = 'Загрузка на сервер...';

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('folder', category); // Сортировка по папкам на сервере Cloudinary

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.secure_url) {
                    // Сохраняем метаданные в локальную базу данных
                    photosDB.push({
                        id: new Date().getTime(),
                        url: data.secure_url,
                        category: category,
                        owner: currentUser
                    });
                    localStorage.setItem('flowers_photos_main', JSON.stringify(photosDB));

                    status.style.color = 'var(--accent)';
                    status.innerText = 'Успешно опубликовано!';
                    setTimeout(() => {
                        closeModal();
                        renderGrid();
                    }, 1000);
                } else {
                    status.style.color = 'var(--danger)';
                    status.innerText = 'Ошибка загрузки.';
                }
            } catch (err) {
                status.style.color = 'var(--danger)';
                status.innerText = 'Ошибка сети при отправке.';
            }
        }
    </script>
</body>
</html>
