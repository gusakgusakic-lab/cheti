<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Порно360</title>
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --bg-input: #21262d;
            --accent: #2ea043;
            --accent-hover: #238636;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --border: #30363d;
            --danger: #f85149;
            --danger-hover: #da3633;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            height: 100vh;
        }
        
        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* --- Экран 1: Авторизация --- */
        .auth-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 360px;
            padding: 30px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .auth-container h2 {
            color: var(--accent);
            margin-top: 0;
            font-size: 1.6rem;
        }

        .ip-badge {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .code-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .code-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* --- Экран 2: Главный экран --- */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--accent);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .user-code {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 6px 10px;
            border-radius: 6px;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid var(--border);
        }

        .navigation {
            display: flex;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 5px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            border-bottom: 2px solid transparent;
        }

        .nav-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .content-area {
            flex: 1;
            position: relative;
            background: var(--bg-main);
            overflow: hidden;
        }

        /* Сетка: Сделано ровно по 2 фото в ряд, карточки стали меньше */
        .grid-view {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 10px;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .grid-view.active {
            display: grid;
        }

        .grid-item {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            height: 140px; /* Уменьшенная высота для баланса */
            position: relative;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Кнопка удаления поверх фото в сетке */
        .delete-grid-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(248, 81, 73, 0.85);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        /* Полноэкранная Лента Свайпов */
        .feed-view {
            display: none;
            height: 100%;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }

        .feed-view::-webkit-scrollbar {
            display: none;
        }

        .feed-view.active {
            display: block;
        }

        .feed-item {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feed-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .feed-meta {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-meta .cat {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        /* Базовые кнопки */
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }

        /* Модалка загрузки */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 25px 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 340px;
        }
        .modal-body h3 { margin-top: 0; color: var(--text-main); }
        .modal-body select, .modal-body input[type="file"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        #status {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>

    <div id="screenAuth" class="screen auth-screen active">
        <div class="auth-container">
            <h2>Цветы360</h2>
            <div class="ip-badge" id="ipLabel">Проверка IP...</div>
            
            <div id="authForm">
                <input type="text" id="inputCode" class="code-input" placeholder="ХХХХХ-ХХХХХ..." maxlength="29">
                <button class="btn" style="width: 100%; padding: 14px;" onclick="handleLogin()">Войти по коду</button>
                <div style="margin: 15px 0; color: var(--text-muted); font-size: 0.85rem;">или</div>
                <button class="btn btn-secondary" style="width: 100%;" id="genBtn" onclick="handleRegister()">Создать новый код для этого IP</button>
            </div>
        </div>
    </div>

    <div id="screenApp" class="screen">
        <header>
            <div class="user-code" id="myCodeDisplay">-----</div>
            <h1>Цветы360</h1>
            <button class="btn" style="padding: 6px 12px; font-size: 0.8rem;" onclick="openModal()">Добавить порно</button>
        </header>

        <div class="navigation">
            <button class="nav-btn active" onclick="switchTab('ВсЁ порно', this)">ВсЁ порно</button>
            <button class="nav-btn" onclick="switchTab('Аниме', this)">Аниме</button>
            <button class="nav-btn" onclick="switchTab('Реал', this)">Реал</button>
            <button class="nav-btn" onclick="switchTab('Фурри', this)">Фурри</button>
        </div>

        <div class="content-area">
            <div id="viewFeed" class="feed-view active"></div>

            <div id="viewGrid" class="grid-view"></div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-body">
            <h3>Новая публикация</h3>
            <select id="uploadCategory">
                <option value="Аниме">Аниме</option>
                <option value="Реал">Реал</option>
                <option value="Фурри">Фурри</option>
            </select>
            <input type="file" id="fileInput" accept="image/*">
            <div id="status"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn" onclick="uploadPhoto()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_NAME = 'dic7fcdgy';
        const UPLOAD_PRESET = 'ctefeth_780';

        let currentIP = '';
        let currentTab = 'Все';

        let ipRegistry = JSON.parse(localStorage.getItem('flowers_ip_registry')) || {}; 
        let localPhotos = JSON.parse(localStorage.getItem('flowers_photos_db')) || [];

        async function checkIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                currentIP = data.ip;
                document.getElementById('ipLabel').innerText = `Ваш IP: ${currentIP}`;
                
                if (ipRegistry[currentIP]) {
                    document.getElementById('genBtn').style.display = 'none';
                    document.getElementById('inputCode').placeholder = "Введите ваш хуй 5х5";
                }
            } catch (e) {
                currentIP = '127.0.0.1';
                document.getElementById('ipLabel').innerText = `Локальный IP режим`;
            }
        }

        function handleRegister() {
            if (ipRegistry[currentIP]) {
                alert('На вашем IP уже зарегистрирован член!');
                return;
            }
            
            const r = () => Math.random().toString(36).substring(2, 7).toUpperCase();
            const newCode = `${r()}-${r()}-${r()}-${r()}-${r()}`;
            
            ipRegistry[currentIP] = newCode;
            localStorage.setItem('flowers_ip_registry', JSON.stringify(ipRegistry));
            
            document.getElementById('inputCode').value = newCode;
            document.getElementById('genBtn').style.display = 'none';
            alert(`Код создан и привязан к IP:\n${newCode}`);
        }

        function handleLogin() {
            const enteredCode = document.getElementById('inputCode').value.trim().toUpperCase();
            const savedCode = ipRegistry[currentIP];

            if (!enteredCode) {
                alert('Введите код!');
                return;
            }

            if (!savedCode) {
                ipRegistry[currentIP] = enteredCode;
                localStorage.setItem('flowers_ip_registry', JSON.stringify(ipRegistry));
            } else if (savedCode !== enteredCode) {
                alert('Ошибка! К этому IP привязан другой код.');
                return;
            }

            document.getElementById('screenAuth').classList.remove('active');
            document.getElementById('screenApp').classList.add('active');
            document.getElementById('myCodeDisplay').innerText = enteredCode;
            
            renderContent();
        }

        function switchTab(category, btn) {
            currentTab = category;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderContent();
        }

        // Удаление фото по ID/индексу времени создания
        function deletePhoto(timestamp) {
            if (confirm('Вы уверены, что хотите удалить это порно?')) {
                localPhotos = localPhotos.filter(p => p.id !== timestamp);
                localStorage.setItem('flowers_photos_db', JSON.stringify(localPhotos));
                renderContent();
            }
        }

        function renderContent() {
            const feedView = document.getElementById('viewFeed');
            const gridView = document.getElementById('viewGrid');
            
            const filtered = [...localPhotos]
                .reverse()
                .filter(p => currentTab === 'Все' || p.category === currentTab);

            if (currentTab === 'ВсЁ порно') {
                feedView.classList.add('active');
                gridView.classList.remove('active');
                feedView.innerHTML = '';

                if (filtered.length === 0) {
                    feedView.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted)">Лента пуста. Добавьте первое порно!</div>`;
                    return;
                }

                filtered.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'feed-item';
                    item.innerHTML = `
                        <img src="${photo.url}" alt="photo">
                        <div class="feed-meta">
                            <div>
                                <div class="cat">${photo.category}</div>
                                <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">От: ${photo.author}</div>
                            </div>
                            <button class="btn btn-danger" style="padding: 6px 10px; font-size: 0.75rem;" onclick="deletePhoto(${photo.id})">Удалить</button>
                        </div>
                    `;
                    feedView.appendChild(item);
                });
            } else {
                gridView.classList.add('active');
                feedView.classList.remove('active');
                gridView.innerHTML = '';

                if (filtered.length === 0) {
                    gridView.innerHTML = `<div style="grid-column:1/-1; padding:40px; text-align:center; color:var(--text-muted)">В этой категории нет фото</div>`;
                    return;
                }

                filtered.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    item.innerHTML = `
                        <img src="${photo.url}" alt="img">
                        <button class="delete-grid-btn" onclick="deletePhoto(${photo.id})">✕</button>
                    `;
                    gridView.appendChild(item);
                });
            }
        }

        function openModal() { document.getElementById('uploadModal').classList.add('active'); }
        function closeModal() { 
            document.getElementById('uploadModal').classList.remove('active'); 
            document.getElementById('status').innerText = '';
            document.getElementById('fileInput').value = '';
        }

        async function uploadPhoto() {
            const fileInput = document.getElementById('fileInput');
            const category = document.getElementById('uploadCategory').value;
            const status = document.getElementById('status');

            if (!fileInput.files[0]) {
                status.style.color = 'crimson';
                status.innerText = 'Выберите PDF файл!';
                return;
            }

            status.style.color = 'var(--text-main)';
            status.innerText = 'Отправка на сервер...';

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('folder', category);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.secure_url) {
                    localPhotos.push({
                        id: new Date().getTime(), // Уникальный ID для удаления
                        url: data.secure_url,
                        category: category,
                        author: ipRegistry[currentIP] || 'User'
                    });
                    localStorage.setItem('flowers_photos_db', JSON.stringify(localPhotos));

                    status.style.color = 'var(--accent)';
                    status.innerText = 'Успешно загружено!';
                    setTimeout(() => {
                        closeModal();
                        renderContent();
                    }, 1000);
                } else {
                    status.style.color = 'crimson';
                    status.innerText = 'Ошибка загрузки.';
                }
            } catch (err) {
                status.style.color = 'crimson';
                status.innerText = 'Ошибка сети.';
            }
        }

        window.onload = checkIP;
    </script>
</body>
</html>
